<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 400; letter-spacing: 0.06em; fill: currentColor; text-anchor: middle; }
    text.root-label { fill: #0A0A0B; }
    line, rect { stroke: currentColor; stroke-width: 1.5; stroke-linecap: square; stroke-linejoin: miter; fill: none; }
    .root-box { fill: #C6F24E; }
  </style>

  <!-- Registration marks (frame corners) -->
  <line x1="6" y1="0" x2="6" y2="6" opacity="0.5"/>
  <line x1="0" y1="6" x2="6" y2="6" opacity="0.5"/>
  <line x1="794" y1="0" x2="794" y2="6" opacity="0.5"/>
  <line x1="800" y1="6" x2="794" y2="6" opacity="0.5"/>
  <line x1="6" y1="594" x2="6" y2="600" opacity="0.5"/>
  <line x1="0" y1="594" x2="6" y2="594" opacity="0.5"/>
  <line x1="794" y1="594" x2="794" y2="600" opacity="0.5"/>
  <line x1="800" y1="594" x2="794" y2="594" opacity="0.5"/>

  <!-- Root box at top center (x=350, y=80, w=100, h=40) -->
  <rect x="300" y="80" width="100" height="40" class="root-box"/>
  <text x="350" y="107" class="root-label">LANDING</text>

  <!-- Child boxes at y=240 -->
  <!-- Child 1: HERO (x=120) -->
  <rect x="70" y="240" width="100" height="40"/>
  <text x="120" y="267">HERO</text>

  <!-- Child 2: CONTENT (x=350) -->
  <rect x="300" y="240" width="100" height="40"/>
  <text x="350" y="267">CONTENT</text>

  <!-- Child 3: FOOTER (x=580) -->
  <rect x="530" y="240" width="100" height="40"/>
  <text x="580" y="267">FOOTER</text>

  <!-- Grandchild boxes at y=400 -->
  <!-- Under HERO: NAV, H1 -->
  <rect x="40" y="400" width="100" height="40"/>
  <text x="90" y="427">NAV</text>

  <rect x="160" y="400" width="100" height="40"/>
  <text x="210" y="427">H1</text>

  <!-- Under CONTENT: INTRO, CARDS -->
  <rect x="270" y="400" width="100" height="40"/>
  <text x="320" y="427">INTRO</text>

  <rect x="390" y="400" width="100" height="40"/>
  <text x="440" y="427">CARDS</text>

  <!-- Under FOOTER: CTA, META -->
  <rect x="500" y="400" width="100" height="40"/>
  <text x="550" y="427">CTA</text>

  <rect x="620" y="400" width="100" height="40"/>
  <text x="670" y="427">META</text>

  <!-- Connection lines: parent to children -->
  <!-- Root (350) to HERO (120) -->
  <line x1="350" y1="120" x2="350" y2="160"/>
  <line x1="350" y1="160" x2="120" y2="160"/>
  <line x1="120" y1="160" x2="120" y2="240"/>

  <!-- Root (350) to CONTENT (350) -->
  <line x1="350" y1="120" x2="350" y2="240"/>

  <!-- Root (350) to FOOTER (580) -->
  <line x1="350" y1="120" x2="350" y2="160"/>
  <line x1="350" y1="160" x2="580" y2="160"/>
  <line x1="580" y1="160" x2="580" y2="240"/>

  <!-- HERO (120) to children NAV (90) and H1 (210) -->
  <line x1="120" y1="280" x2="120" y2="320"/>
  <line x1="90" y1="320" x2="210" y2="320"/>
  <line x1="90" y1="320" x2="90" y2="400"/>
  <line x1="210" y1="320" x2="210" y2="400"/>

  <!-- CONTENT (350) to children INTRO (320) and CARDS (440) -->
  <line x1="350" y1="280" x2="350" y2="320"/>
  <line x1="320" y1="320" x2="440" y2="320"/>
  <line x1="320" y1="320" x2="320" y2="400"/>
  <line x1="440" y1="320" x2="440" y2="400"/>

  <!-- FOOTER (580) to children CTA (550) and META (670) -->
  <line x1="580" y1="280" x2="580" y2="320"/>
  <line x1="550" y1="320" x2="670" y2="320"/>
  <line x1="550" y1="320" x2="550" y2="400"/>
  <line x1="670" y1="320" x2="670" y2="400"/>
</svg>
