<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 400; letter-spacing: 0.06em; fill: currentColor; text-anchor: start; }
    line, circle, rect, path { stroke: currentColor; stroke-width: 1.5; stroke-linecap: square; stroke-linejoin: miter; fill: none; }
  </style>

  <!-- Registration marks (frame corners) -->
  <line x1="6" y1="0" x2="6" y2="6" opacity="0.5"/>
  <line x1="0" y1="6" x2="6" y2="6" opacity="0.5"/>
  <line x1="794" y1="0" x2="794" y2="6" opacity="0.5"/>
  <line x1="800" y1="6" x2="794" y2="6" opacity="0.5"/>
  <line x1="6" y1="594" x2="6" y2="600" opacity="0.5"/>
  <line x1="0" y1="594" x2="6" y2="594" opacity="0.5"/>
  <line x1="794" y1="594" x2="794" y2="600" opacity="0.5"/>
  <line x1="800" y1="594" x2="794" y2="594" opacity="0.5"/>

  <!-- Main vertical axis -->
  <line x1="400" y1="80" x2="400" y2="520"/>

  <!-- Tick marks along axis (left side, 8u long) -->
  <line x1="392" y1="80" x2="400" y2="80"/>
  <line x1="392" y1="160" x2="400" y2="160"/>
  <line x1="392" y1="240" x2="400" y2="240"/>
  <line x1="392" y1="320" x2="400" y2="320"/>
  <line x1="392" y1="400" x2="400" y2="400"/>
  <line x1="392" y1="480" x2="400" y2="480"/>

  <!-- Tick marks along axis (right side, 8u long) -->
  <line x1="400" y1="80" x2="408" y2="80"/>
  <line x1="400" y1="160" x2="408" y2="160"/>
  <line x1="400" y1="240" x2="408" y2="240"/>
  <line x1="400" y1="320" x2="408" y2="320"/>
  <line x1="400" y1="400" x2="408" y2="400"/>
  <line x1="400" y1="480" x2="408" y2="480"/>

  <!-- Three orbiting rings -->
  <!-- Ring 1 at (340, 200) -->
  <circle cx="340" cy="200" r="8"/>

  <!-- Ring 2 at (460, 320) - with Voltage signal dot -->
  <circle cx="460" cy="320" r="8"/>
  <circle cx="460" cy="320" r="3" fill="#C6F24E"/>

  <!-- Ring 3 at (380, 440) -->
  <circle cx="380" cy="440" r="8"/>

  <!-- Mono label at top-left -->
  <text x="40" y="100">AXIS · X 400  Y 80→520</text>
</svg>
