<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 400; letter-spacing: 0.06em; fill: currentColor; text-anchor: start; }
    line, circle, rect, path, polygon { stroke: currentColor; stroke-width: 1.5; stroke-linecap: square; stroke-linejoin: miter; fill: none; }
  </style>

  <!-- Registration marks (frame corners) -->
  <line x1="6" y1="0" x2="6" y2="6" opacity="0.5"/>
  <line x1="0" y1="6" x2="6" y2="6" opacity="0.5"/>
  <line x1="794" y1="0" x2="794" y2="6" opacity="0.5"/>
  <line x1="800" y1="6" x2="794" y2="6" opacity="0.5"/>
  <line x1="6" y1="594" x2="6" y2="600" opacity="0.5"/>
  <line x1="0" y1="594" x2="6" y2="594" opacity="0.5"/>
  <line x1="794" y1="594" x2="794" y2="600" opacity="0.5"/>
  <line x1="800" y1="594" x2="794" y2="594" opacity="0.5"/>

  <!-- Vertical axis through center -->
  <line x1="400" y1="80" x2="400" y2="520"/>

  <!-- Horizontal axis through center -->
  <line x1="80" y1="300" x2="720" y2="300"/>

  <!-- Measurement square at intersection (24x24) -->
  <rect x="388" y="288" width="24" height="24"/>

  <!-- Tick marks on vertical axis -->
  <line x1="392" y1="80" x2="400" y2="80"/>
  <line x1="392" y1="140" x2="400" y2="140"/>
  <line x1="392" y1="200" x2="400" y2="200"/>
  <line x1="392" y1="260" x2="400" y2="260"/>
  <line x1="392" y1="340" x2="400" y2="340"/>
  <line x1="392" y1="400" x2="400" y2="400"/>
  <line x1="392" y1="460" x2="400" y2="460"/>
  <line x1="392" y1="520" x2="400" y2="520"/>

  <!-- Tick marks on vertical axis (right) -->
  <line x1="400" y1="80" x2="408" y2="80"/>
  <line x1="400" y1="140" x2="408" y2="140"/>
  <line x1="400" y1="200" x2="408" y2="200"/>
  <line x1="400" y1="260" x2="408" y2="260"/>
  <line x1="400" y1="340" x2="408" y2="340"/>
  <line x1="400" y1="400" x2="408" y2="400"/>
  <line x1="400" y1="460" x2="408" y2="460"/>
  <line x1="400" y1="520" x2="408" y2="520"/>

  <!-- Tick marks on horizontal axis -->
  <line x1="80" y1="296" x2="80" y2="304"/>
  <line x1="140" y1="296" x2="140" y2="304"/>
  <line x1="200" y1="296" x2="200" y2="304"/>
  <line x1="260" y1="296" x2="260" y2="304"/>
  <line x1="540" y1="296" x2="540" y2="304"/>
  <line x1="600" y1="296" x2="600" y2="304"/>
  <line x1="660" y1="296" x2="660" y2="304"/>
  <line x1="720" y1="296" x2="720" y2="304"/>

  <!-- Voltage filled chevron pointing right at end of horizontal axis -->
  <polygon points="720,290 710,300 720,310" fill="#C6F24E"/>

  <!-- Mono intersection label -->
  <text x="410" y="280">90.000°</text>

  <!-- Mono corner label -->
  <text x="700" y="110">INTERSECTION · 01 / 01</text>
</svg>
