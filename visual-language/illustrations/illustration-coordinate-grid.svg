<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 400; letter-spacing: 0.06em; fill: currentColor; text-anchor: start; }
    line, circle, rect { stroke: currentColor; stroke-width: 1.5; stroke-linecap: square; stroke-linejoin: miter; fill: none; }
    .dotted { stroke-dasharray: 2 4; }
    .voltage-ring { stroke: #C6F24E; }
  </style>

  <!-- Registration marks (frame corners) -->
  <line x1="6" y1="0" x2="6" y2="6" opacity="0.5"/>
  <line x1="0" y1="6" x2="6" y2="6" opacity="0.5"/>
  <line x1="794" y1="0" x2="794" y2="6" opacity="0.5"/>
  <line x1="800" y1="6" x2="794" y2="6" opacity="0.5"/>
  <line x1="6" y1="594" x2="6" y2="600" opacity="0.5"/>
  <line x1="0" y1="594" x2="6" y2="594" opacity="0.5"/>
  <line x1="794" y1="594" x2="794" y2="600" opacity="0.5"/>
  <line x1="800" y1="594" x2="794" y2="594" opacity="0.5"/>

  <!-- Horizontal X axis -->
  <line x1="80" y1="500" x2="720" y2="500"/>

  <!-- Vertical Y axis -->
  <line x1="80" y1="80" x2="80" y2="500"/>

  <!-- X axis tick marks -->
  <line x1="80" y1="496" x2="80" y2="504"/>
  <line x1="160" y1="496" x2="160" y2="504"/>
  <line x1="240" y1="496" x2="240" y2="504"/>
  <line x1="320" y1="496" x2="320" y2="504"/>
  <line x1="400" y1="496" x2="400" y2="504"/>
  <line x1="480" y1="496" x2="480" y2="504"/>
  <line x1="560" y1="496" x2="560" y2="504"/>
  <line x1="640" y1="496" x2="640" y2="504"/>
  <line x1="720" y1="496" x2="720" y2="504"/>

  <!-- Y axis tick marks -->
  <line x1="76" y1="80" x2="84" y2="80"/>
  <line x1="76" y1="160" x2="84" y2="160"/>
  <line x1="76" y1="240" x2="84" y2="240"/>
  <line x1="76" y1="320" x2="84" y2="320"/>
  <line x1="76" y1="400" x2="84" y2="400"/>
  <line x1="76" y1="480" x2="84" y2="480"/>

  <!-- Dotted lines from point to axes -->
  <line x1="480" y1="240" x2="480" y2="500" class="dotted"/>
  <line x1="80" y1="240" x2="480" y2="240" class="dotted"/>

  <!-- Data point at (480, 240) -->
  <circle cx="480" cy="240" r="4" fill="currentColor"/>

  <!-- Voltage outline ring around point -->
  <circle cx="480" cy="240" r="8" class="voltage-ring"/>

  <!-- Mono labels -->
  <text x="460" y="530">X: 480</text>
  <text x="20" y="260">Y: 240</text>
</svg>
