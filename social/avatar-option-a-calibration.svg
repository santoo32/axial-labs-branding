<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">

  <rect width="400" height="400" fill="#0A0A0B"/>

  <!-- Orbit ring -->
  <circle cx="200" cy="200" r="168" fill="none" stroke="#1C1E23" stroke-width="1" stroke-linecap="square"/>

  <!-- Compass ticks — N / S / W / E -->
  <line x1="200" y1="24" x2="200" y2="40" stroke="#3A3D44" stroke-width="1" stroke-linecap="square"/>
  <line x1="200" y1="360" x2="200" y2="376" stroke="#3A3D44" stroke-width="1" stroke-linecap="square"/>
  <line x1="24"  y1="200" x2="40"  y2="200" stroke="#3A3D44" stroke-width="1" stroke-linecap="square"/>
  <line x1="360" y1="200" x2="376" y2="200" stroke="#3A3D44" stroke-width="1" stroke-linecap="square"/>

  <!-- Voltage signal dot — East -->
  <circle cx="374" cy="200" r="3.5" fill="#C6F24E"/>

  <!-- Brand cross — bone, large (48px bars / 272px span) -->
  <rect x="176" y="64" width="48" height="272" fill="#F4F2EC"/>
  <rect x="64"  y="176" width="272" height="48" fill="#F4F2EC"/>

  <!-- Measurement ticks crossing each arm at midpoint -->
  <!-- Left arm  x=120 -->
  <line x1="120" y1="176" x2="120" y2="224" stroke="#0A0A0B" stroke-width="1" stroke-linecap="square"/>
  <!-- Right arm x=280 -->
  <line x1="280" y1="176" x2="280" y2="224" stroke="#0A0A0B" stroke-width="1" stroke-linecap="square"/>
  <!-- Top arm  y=120 -->
  <line x1="176" y1="120" x2="224" y2="120" stroke="#0A0A0B" stroke-width="1" stroke-linecap="square"/>
  <!-- Bottom arm y=280 -->
  <line x1="176" y1="280" x2="224" y2="280" stroke="#0A0A0B" stroke-width="1" stroke-linecap="square"/>

</svg>
